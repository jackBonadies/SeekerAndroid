name: Unit Tests

on:
  push:
    branches: [master, filterUI]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Run UnitTestCommon
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore UnitTestCommon/UnitTestCommon.csproj

      - name: Build
        run: dotnet build UnitTestCommon/UnitTestCommon.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test UnitTestCommon/UnitTestCommon.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
