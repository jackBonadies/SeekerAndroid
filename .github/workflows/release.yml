name: Build IzzySoft Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      attach_to_release:
        description: 'Attach APK to a GitHub release (tag name, blank to skip)'
        required: false
        default: ''

jobs:
  build:
    name: Build Release IzzySoft on Ubuntu
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: 'Release IzzySoft'
      # Deterministic build helpers (best-effort — full byte-for-byte reproducibility
      # still requires audit of trimmer/AOT output and APK packaging order).
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so we can derive SOURCE_DATE_EPOCH from the tag commit

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET (honors global.json -> 9.0.201)
        uses: actions/setup-dotnet@v4

      - name: Install android workload
        run: dotnet workload install android

      - name: Derive SOURCE_DATE_EPOCH from HEAD commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore Seeker/Seeker.csproj

      - name: Publish APK (Release IzzySoft)
        env:
          AndroidSigningKeyStore: ${{ env.KEYSTORE_PATH }}
          AndroidSigningKeyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          AndroidSigningKeyPass: ${{ secrets.ANDROID_KEY_PASSWORD }}
          AndroidSigningStorePass: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          dotnet publish Seeker/Seeker.csproj \
            -c "$CONFIGURATION" \
            -f net9.0-android \
            -p:AndroidPackageFormat=apk \
            -p:AndroidSigningKeyStore="$KEYSTORE_PATH" \
            -p:AndroidSigningKeyAlias="$AndroidSigningKeyAlias" \
            -p:AndroidSigningKeyPass="$AndroidSigningKeyPass" \
            -p:AndroidSigningStorePass="$AndroidSigningStorePass" \
            -p:ContinuousIntegrationBuild=true \
            -p:Deterministic=true \
            -p:SourceRevisionId=${{ github.sha }}

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find Seeker/bin -type f -name "*-Signed.apk" -o -name "*.apk" 2>/dev/null \
                  | grep -i "Release IzzySoft" | grep -iv unsigned | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found under Seeker/bin"
            find Seeker/bin -type f -name "*.apk" || true
            exit 1
          fi
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: seeker-izzysoft-apk
          path: ${{ steps.find_apk.outputs.apk_path }}

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.attach_to_release != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.attach_to_release || github.ref_name }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          fail_on_unmatched_files: true
